name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -e ".[crypto]" || pip install -e . || true
          pip install pytest httpx fastapi uvicorn 2>/dev/null || true

      - name: Lint with ruff
        run: |
          ruff check src/ --config ruff.toml || true

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(ls tests/*.py 2>/dev/null)" ]; then
            pytest tests/ -x -q --tb=short
          else
            echo "No tests found — skipping"
          fi
