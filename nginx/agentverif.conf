# agentverif.com — nginx configuration
# Covers: agentverif.com, www, verify, api, sign
# Run: nginx -t && systemctl reload nginx

# ── www → apex redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.agentverif.com;
    return 301 https://agentverif.com$request_uri;
}

# ── Main site: agentverif.com ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name agentverif.com;

    # Certbot will add the HTTPS block below; this handles HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agentverif.com www.agentverif.com;

    root /root/agentverif/web;
    index index.html;

    # SSL (populated by certbot)
    ssl_certificate     /etc/letsencrypt/live/agentverif.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentverif.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # www → apex
    if ($host = www.agentverif.com) {
        return 301 https://agentverif.com$request_uri;
    }

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml image/svg+xml;

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — no cache (allows instant deploys)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # robots.txt and sitemap — cache briefly
    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        expires 1d;
    }

    # SPA fallback (single directory, not a full SPA, but safe)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404
    error_page 404 /404.html;
}

# ── verify.agentverif.com ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name verify.agentverif.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name verify.agentverif.com;

    root /root/agentverif/verify;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/agentverif.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentverif.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location ~* \.(css|js|svg|png|jpg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── api.agentverif.com → FastAPI (port 8090) ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.agentverif.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.agentverif.com;

    ssl_certificate     /etc/letsencrypt/live/agentverif.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentverif.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # CORS preflight handled by FastAPI middleware; nginx just proxies
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# ── sign.agentverif.com → sign service (port 8091) ───────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sign.agentverif.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sign.agentverif.com;

    ssl_certificate     /etc/letsencrypt/live/agentverif.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentverif.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass         http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
